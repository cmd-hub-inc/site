<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Something went wrong</title>
    <style>
      html,body{height:100%;margin:0}
      body{display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#0f1720;color:#e6eef8}
      .card{max-width:720px;padding:36px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.02));box-shadow:0 6px 30px rgba(2,6,23,0.6);text-align:center}
      h1{margin:0 0 8px;font-size:28px}
      p{margin:0 0 16px;color:#b6c2d6}
      a.button{display:inline-block;padding:10px 16px;border-radius:8px;background:#2563eb;color:white;text-decoration:none}
      .code{display:inline-block;padding:6px 10px;border-radius:6px;background:rgba(255,255,255,0.03);margin-left:8px;font-weight:600}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Something went wrong <span id="status" class="code">—</span></h1>
      <p>We're sorry — an error occurred while processing your request. Try refreshing, or return home.</p>
      <p>
        <a class="button" href="/">Go home</a>
      </p>
      <p style="margin-top:12px;color:#8d9bb0;font-size:13px">If the problem persists, contact support.</p>
    </div>
    <script>
      // Display any available status code passed via known globals or query params.
      (function(){
        try{
          var statusEl = document.getElementById('status');

          // 1) Check query param ?status=NN or ?code=NN
          var qs = (typeof window !== 'undefined' && window.location && window.location.search) ? window.location.search : '';
          if (qs) {
            try {
              var params = new URLSearchParams(qs);
              var s = params.get('status') || params.get('code') || params.get('status_code');
              if (s) {
                statusEl.textContent = s;
                return;
              }
              // If oauth errors are present, surface them
              var oauthErr = params.get('error');
              var oauthDesc = params.get('error_description');
              if (oauthErr) {
                statusEl.textContent = oauthErr + (oauthDesc ? (': ' + decodeURIComponent(oauthDesc)) : '');
                return;
              }
            } catch (e) {}
          }

          // 2) Known global injected by some platforms
          if (window.__VERCEL_ERROR__ && window.__VERCEL_ERROR__.status) {
            statusEl.textContent = window.__VERCEL_ERROR__.status;
            return;
          }

          // 3) Next/other frameworks sometimes expose a globals object
          if (window.__NEXT_DATA__ && window.__NEXT_DATA__.props) {
            var nd = window.__NEXT_DATA__.props;
            if (nd.statusCode) { statusEl.textContent = nd.statusCode; return; }
            if (nd.pageProps && nd.pageProps.status) { statusEl.textContent = nd.pageProps.status; return; }
          }

          // 4) Fallback to generic label
          statusEl.textContent = 'error';
        }catch(e){
          // ignore
        }
      })();
    </script>
  </body>
</html>
